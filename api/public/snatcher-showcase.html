<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Snatcher Showcase</title>
    <style>
        /* NeXTSTEP Aesthetic */
        body {
            background-color: #bfbfbf;
            font-family: Helvetica, Arial, sans-serif;
            color: #000;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            -webkit-font-smoothing: none;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }

        .icon {
            width: 48px;
            height: 48px;
            background: #fff;
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-bottom: 2px solid #fff;
            border-right: 2px solid #fff;
            padding: 4px;
        }

        .title-block h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }
        .title-block p { margin: 4px 0 0 0; font-size: 14px; font-weight: bold; color: #444; }

        .content {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }

        /* Image Display Area */
        .image-container {
            flex: 2;
            background: #000;
            border-top: 3px solid #555;
            border-left: 3px solid #555;
            border-bottom: 3px solid #fff;
            border-right: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Pixelated for retro feel, or remove if you want smooth screenshots */
            /* image-rendering: pixelated; */ 
        }

        /* Sidebar / Controls */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #aaaaaa;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #555;
            border-right: 2px solid #555;
            padding: 15px;
        }

        .step-counter {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .description {
            flex: 1;
            font-size: 14px;
            line-height: 1.4;
            background: #fff;
            padding: 12px;
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-bottom: 2px solid #fff;
            border-right: 2px solid #fff;
            overflow-y: auto;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            gap: 10px;
        }

        /* NeXT Buttons */
        button {
            flex: 1;
            background: #bfbfbf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #555;
            border-right: 2px solid #555;
            padding: 8px 0;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }

        button:active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-bottom: 2px solid #fff;
            border-right: 2px solid #fff;
            background: #aaaaaa;
        }

        button:disabled {
            color: #777;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="header">
        <svg class="icon" viewBox="0 0 32 32"><rect width="32" height="32" fill="#500"/><circle cx="16" cy="16" r="12" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="2,2"/><circle cx="16" cy="16" r="6" fill="none" stroke="#fff" stroke-width="2"/><line x1="16" y1="0" x2="16" y2="32" stroke="#fff" stroke-width="2"/><line x1="0" y1="16" x2="32" y2="16" stroke="#fff" stroke-width="2"/><line x1="4" y1="4" x2="28" y2="28" stroke="#fff" stroke-width="2"/><line x1="4" y1="28" x2="28" y2="4" stroke="#fff" stroke-width="2"/></svg>
        <div class="title-block">
            <h1>WP Web Snatcher</h1>
            <p>Chrome Extension Architecture & Workflow</p>
        </div>
    </div>

    <div class="content">
        <div class="image-container">
            <img id="showcase-img" src="placeholder.png" alt="Showcase Image">
        </div>
        
        <div class="sidebar">
            <div class="step-counter" id="step-counter">Step 1 of 4</div>
            <div class="description" id="step-desc">
                Loading description...
            </div>
            <div class="controls">
                <button id="btn-prev">Previous</button>
                <button id="btn-next">Next</button>
            </div>
        </div>
    </div>

    <script>
        // Define your steps here! Replace 'src' with your actual image paths.
        const steps = [
            {
                src: "img/image1.png", 
                text: "<b>1. Visual Selection Mode</b><br><br>Instead of forcing the user to manually inspect CSS classes, the extension injects a content script into the target store. As the user hovers over elements, it calculates the optimal, most unique DOM path (climbing up the DOM tree to find unique IDs or data-attributes) to reliably extract titles, prices, and images."
            },
            {
                src: "img/image2.png",
                text: "<b>2. Data Extraction & Rule Saving</b><br><br>Once the user selects the required fields, the DOM paths are saved to Chrome Local Storage. The Background Service Worker can now use these rules to silently scrape multiple URLs in the background without user intervention."
            },
            {
                src: "img/image3.png",
                text: "<b>3. Review & Edit Dashboard</b><br><br>The extracted data is populated into a custom UI. Here, users can edit the title, adjust the price, reorder images via drag-and-drop, and format the product specifications using a custom-built Rich Text Editor."
            },
            {
                src: "img/image4.jpeg",
                text: "<b>4. WooCommerce REST API Integration</b><br><br>Upon clicking Publish, the extension bundles the images, formats the HTML payload, and pushes it directly to the WooCommerce REST API using basic authentication. The product immediately appears as a Draft in the WordPress backend."
            }
        ];

        let currentIndex = 0;
        const imgEl = document.getElementById('showcase-img');
        const descEl = document.getElementById('step-desc');
        const countEl = document.getElementById('step-counter');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function updateUI() {
            const step = steps[currentIndex];
            imgEl.src = step.src;
            descEl.innerHTML = step.text;
            countEl.innerText = `Step ${currentIndex + 1} of ${steps.length}`;

            btnPrev.disabled = currentIndex === 0;
            btnNext.disabled = currentIndex === steps.length - 1;
        }

        btnPrev.onclick = () => { if (currentIndex > 0) { currentIndex--; updateUI(); } };
        btnNext.onclick = () => { if (currentIndex < steps.length - 1) { currentIndex++; updateUI(); } };

        // Init
        updateUI();
    </script>
</body>
</html>
